<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Queries1</title>
    <style>
        body{
            margin: 0;
            /* height: 100vh; */
            background-color: grey;     /* desktop view*/
        }
        @media(max-width:1024px) and (min-width:768px)
        {
            body{
                background-color: lightblue;    /* Laptop/Tablet view*/
            }
        }
        @media(max-width:767px)
        {
            body{
                background-color: blue;
            }
        }


    </style>
</head>
<body>
    
</body>
</html>
